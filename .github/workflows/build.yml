name: Build Executables

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint (Ruff + Pylint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Ruff lint check
        run: python -m ruff check .

  test:
    name: Test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.10', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest -v

  check-changes:
    name: Check for build-related file changes
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.filter.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            should_build:
              - 'gui.spec'
              - 'kwaras.spec'
              - 'requirements.txt'
              - 'requirements-dev.txt'
              - 'build.ps1'
              - 'build.sh'
              - 'pyproject.toml'
              - '.github/workflows/build.yml'

  build-windows:
    name: Build Windows executables
    runs-on: windows-latest
    needs: [lint, test, check-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      needs.check-changes.outputs.should_build == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build GUI and CLI
        shell: pwsh
        run: .\build.ps1 -Clean

      - name: Smoke test CLI executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Recurse -Filter "kwaras.exe" | Select-Object -First 1
          if ($exe) {
            & $exe.FullName --help
          } else {
            Write-Host "kwaras.exe not found"
            exit 1
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kwaras-windows
          path: |
            dist/gui/**
            dist/kwaras/**

  build-unix:
    name: Build Linux executables
    runs-on: ubuntu-latest
    needs: [lint, test, check-changes]
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      needs.check-changes.outputs.should_build == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Make build script executable
        run: chmod +x ./build.sh

      - name: Build GUI and CLI
        run: ./build.sh both --clean

      - name: Smoke test CLI executable
        run: |
          EXE=$(find dist -name "kwaras" -type f -executable | head -1)
          if [ -n "$EXE" ]; then
            "$EXE" --help
          else
            echo "kwaras executable not found"
            exit 1
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kwaras-linux
          path: |
            dist/gui/**
            dist/kwaras/**
